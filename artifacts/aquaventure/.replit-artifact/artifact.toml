kind = "web"
previewPath = "/"
title = "Aquaventure Swim School"
version = "1.0.0"
id = "artifacts/aquaventure"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22591

[services.development]
run = "pnpm --filter @workspace/aquaventure run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aquaventure", "run", "build" ]
publicDir = "artifacts/aquaventure/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22591"
BASE_PATH = "/"
