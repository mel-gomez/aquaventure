openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Aquaventure Swim School API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: programs
    description: Swim programs
  - name: sessions
    description: Class sessions
  - name: enrollments
    description: Enrollments
  - name: announcements
    description: Announcements
  - name: profile
    description: User profile
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenBody"
      responses:
        "200":
          description: New tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /programs:
    get:
      operationId: listPrograms
      tags: [programs]
      summary: List all programs
      responses:
        "200":
          description: Programs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Program"

  /programs/{id}:
    get:
      operationId: getProgram
      tags: [programs]
      summary: Get a program by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Program
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Program"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List upcoming sessions
      parameters:
        - name: programId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Sessions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a session by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /enrollments:
    post:
      operationId: createEnrollment
      tags: [enrollments]
      summary: Enroll in a session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnrollmentBody"
      responses:
        "201":
          description: Enrollment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /enrollments/my:
    get:
      operationId: getMyEnrollments
      tags: [enrollments]
      summary: Get current user enrollments
      security:
        - bearerAuth: []
      responses:
        "200":
          description: My enrollments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Enrollment"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /enrollments/{id}:
    delete:
      operationId: cancelEnrollment
      tags: [enrollments]
      summary: Cancel an enrollment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Canceled
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/swimmers:
    get:
      operationId: listSwimmers
      tags: [admin]
      summary: List all swimmers/parents
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Swimmers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/enrollments:
    get:
      operationId: listAllEnrollments
      tags: [admin]
      summary: List all enrollments
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All enrollments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Enrollment"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/enrollments/{id}/status:
    patch:
      operationId: updateEnrollmentStatus
      tags: [admin]
      summary: Update enrollment status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEnrollmentStatusBody"
      responses:
        "200":
          description: Updated enrollment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/programs:
    post:
      operationId: createProgram
      tags: [admin]
      summary: Create a new program
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgramBody"
      responses:
        "201":
          description: Created program
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Program"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/sessions:
    post:
      operationId: createSession
      tags: [admin]
      summary: Create a new session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/announcements:
    post:
      operationId: createAnnouncement
      tags: [admin]
      summary: Create an announcement
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RegisterBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [parent, swimmer]
      required:
        - email
        - password
        - firstName
        - lastName

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    RefreshTokenBody:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - accessToken
        - refreshToken
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, parent, swimmer]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - firstName
        - lastName
        - role
        - createdAt

    UpdateProfileBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: ["string", "null"]

    Program:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        level:
          type: string
          enum: [beginner, intermediate, advanced, competitive]
        ageMin:
          type: integer
        ageMax:
          type: integer
        maxStudents:
          type: integer
        pricePerSession:
          type: number
        durationWeeks:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - level
        - ageMin
        - ageMax
        - maxStudents
        - pricePerSession
        - durationWeeks
        - createdAt

    CreateProgramBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        level:
          type: string
          enum: [beginner, intermediate, advanced, competitive]
        ageMin:
          type: integer
        ageMax:
          type: integer
        maxStudents:
          type: integer
        pricePerSession:
          type: number
        durationWeeks:
          type: integer
      required:
        - name
        - description
        - level
        - ageMin
        - ageMax
        - maxStudents
        - pricePerSession
        - durationWeeks

    Session:
      type: object
      properties:
        id:
          type: integer
        programId:
          type: integer
        programName:
          type: string
        programLevel:
          type: string
        instructorName:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        schedule:
          type: string
        location:
          type: string
        enrolledCount:
          type: integer
        maxStudents:
          type: integer
        status:
          type: string
          enum: [upcoming, ongoing, completed, cancelled]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - programId
        - programName
        - programLevel
        - instructorName
        - startDate
        - endDate
        - schedule
        - location
        - enrolledCount
        - maxStudents
        - status
        - createdAt

    CreateSessionBody:
      type: object
      properties:
        programId:
          type: integer
        instructorName:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        schedule:
          type: string
        location:
          type: string
      required:
        - programId
        - instructorName
        - startDate
        - endDate
        - schedule
        - location

    Enrollment:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        sessionId:
          type: integer
        swimmerName:
          type: string
        swimmerAge:
          type: integer
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
        sessionInfo:
          $ref: "#/components/schemas/Session"
        userEmail:
          type: ["string", "null"]
        userName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - sessionId
        - swimmerName
        - swimmerAge
        - status
        - createdAt

    CreateEnrollmentBody:
      type: object
      properties:
        sessionId:
          type: integer
        swimmerName:
          type: string
        swimmerAge:
          type: integer
      required:
        - sessionId
        - swimmerName
        - swimmerAge

    UpdateEnrollmentStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
      required:
        - status

    Announcement:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - content
        - createdAt

    CreateAnnouncementBody:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
      required:
        - title
        - content

    AdminStats:
      type: object
      properties:
        totalSwimmers:
          type: integer
        totalEnrollments:
          type: integer
        activePrograms:
          type: integer
        upcomingSessions:
          type: integer
        pendingEnrollments:
          type: integer
        confirmedEnrollments:
          type: integer
        enrollmentsByLevel:
          type: array
          items:
            type: object
            properties:
              level:
                type: string
              count:
                type: integer
            required:
              - level
              - count
        recentEnrollments:
          type: array
          items:
            $ref: "#/components/schemas/Enrollment"
      required:
        - totalSwimmers
        - totalEnrollments
        - activePrograms
        - upcomingSessions
        - pendingEnrollments
        - confirmedEnrollments
        - enrollmentsByLevel
        - recentEnrollments
